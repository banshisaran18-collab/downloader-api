<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Super Downloader</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f12; color: #ffffff; text-align: center; padding: 40px 20px; margin: 0; }
        .wrapper { max-width: 550px; margin: 50px auto; background: #1a1a24; padding: 35px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); border: 1px solid #2d2d3f; }
        h2 { margin-top: 0; color: #4facfe; font-size: 28px; }
        p { color: #a0a0b0; font-size: 14px; margin-bottom: 25px; }
        .input-box { width: 100%; padding: 14px; margin-bottom: 20px; border: 2px solid #2d2d3f; background: #0f0f12; color: #fff; border-radius: 8px; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        .input-box:focus { border-color: #00f2fe; outline: none; }
        .btn { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #000; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; box-sizing: border-box; box-shadow: 0 4px 15px rgba(0,242,254,0.3); transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,242,254,0.5); }
        #loader { margin-top: 25px; font-weight: 600; font-size: 15px; color: #ffb300; min-height: 25px; }
        .supported-logos { margin-top: 30px; font-size: 12px; color: #63637b; display: flex; justify-content: center; gap: 15px; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>🚀 All-in-One Downloader</h2>
    <p>Download Videos from Instagram, YouTube, TikTok, Twitter & more!</p>
    
    <input type="text" id="linkInput" class="input-box" placeholder="Paste your video link here...">
    <!-- Is button ka function name dhyaan se dekhein -->
    <button onclick="handleDownload()" class="btn">Extract & Download</button>
    
    <!-- Yeh loader hamesha ready rahega status batane ke liye -->
    <div id="loader"></div>
    
    <div class="supported-logos">
        <span>✓ Instagram</span> <span>✓ YouTube</span> <span>✓ TikTok</span> <span>✓ Twitter/X</span>
    </div>
</div>

<!-- Yeh aapki index.js file ko connect karega -->
<script src="index.js"></script>
</body>
</html>
